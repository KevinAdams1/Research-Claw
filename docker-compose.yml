services:
  research-claw:
    image: ghcr.io/wentorai/research-claw:latest
    build:
      context: .
      # 海外用户取消注释以使用默认源（跳过中国镜像）：
      # args:
      #   APT_MIRROR: deb.debian.org
      #   NPM_REGISTRY: https://registry.npmjs.org
      # 构建时代理（如果你的网络需要翻墙拉 GitHub 依赖，取消注释）
      #   HTTP_PROXY: http://host.docker.internal:7890
      #   HTTPS_PROXY: http://host.docker.internal:7890
    ports:
      - "127.0.0.1:28789:28789"
    environment:
      - OPENCLAW_GATEWAY_TOKEN=research-claw
      # 运行时代理（如果你的 LLM API 需要代理，取消注释下面两行）
      # - HTTP_PROXY=http://host.docker.internal:7890
      # - HTTPS_PROXY=http://host.docker.internal:7890
    volumes:
      - rc-config:/app/config            # API key + gateway config
      - rc-data:/app/.research-claw      # SQLite database
      - rc-workspace:/app/workspace      # User workspace files
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:28789/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  rc-config:
  rc-data:
  rc-workspace:
